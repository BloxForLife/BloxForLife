<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BloxForLife | Profile</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="main-wrapper">
        <div id="discord-sidebar" class="discord-profile">
            <div class="loading-text">Loading Discord Profile...</div>
        </div>

        <div class="container">
            <div class="profile-card">
                <h1>BloxForLife</h1>
                <p>Discord Bot Developer</p>
                <div class="links">
                    <a href="https://discord.com/users/1075335630353080340" class="btn">Discord</a>
                    <a href="https://www.roblox.com/users/4548670369/profile" class="btn">Roblox</a>
                    <a href="https://github.com/BloxForLife" class="btn">GitHub</a>
                </div>
            </div>
        </div>
    </div>

    <script>
        const discordId = '1075335630353080340';
        fetch(`https://api.lanyard.rest/v1/users/${discordId}`)
            .then(res => res.json())
            .then(data => {
                if (data.success) {
                    const u = data.data.discord_user;
                    const sidebar = document.getElementById('discord-sidebar');
                    
                    // Build Discord-style HTML
                    sidebar.innerHTML = `
                        <div class="dc-banner" style="background-image: url('https://cdn.discordapp.com/banners/${discordId}/${u.banner}.png?size=512')"></div>
                        <div class="dc-avatar-wrap">
                            <img src="https://cdn.discordapp.com/avatars/${discordId}/${u.avatar}.png?size=256" class="dc-avatar">
                        </div>
                        <div class="dc-body">
                            <h3>${u.username}</h3>
                            <div class="dc-about">${data.data.kv.about || "No bio set."}</div>
                        </div>
                    `;
                }
            });
    </script>
</body>
</html>
