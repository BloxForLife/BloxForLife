<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BloxForLife | Bio</title>
    <link rel="stylesheet" href="style.css">
    <!-- Added FontAwesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <div class="profile-card">
            
            <!-- Requirement #1: Updated pfp to blox.jpg -->
            <div class="pfp-container">
                <img src="blox.jpg" alt="Profile" class="avatar">
            </div>
            
            <h1>BloxForLife</h1>
            
            <div class="bio">
                <!-- Removed Roblox Community Manager -->
                <p>Discord Bot Developer</p>
            </div>

            <div class="time-container">
                <i class="fa-regular fa-clock"></i> <span id="local-time">Loading time...</span> (EEST)
            </div>

            <!-- Requirement #2: Updated to lyin2me.mp3 and added autoplay -->
            <div class="music-player">
                <i class="fa-solid fa-music music-icon"></i>
                <audio id="bg-music" src="lyin2me.mp3" loop autoplay></audio>
                <button id="play-btn" class="ctrl-btn"><i class="fa-solid fa-play"></i> Play</button>
                <input type="range" id="volume-slider" min="0" max="1" step="0.01" value="0.3">
            </div>

            <div class="links">
                <!-- Added icons to buttons for better aesthetics -->
                <a href="https://discord.com/users/1075335630353080340" target="_blank" class="btn discord"><i class="fa-brands fa-discord"></i> Discord</a>
                <a href="https://www.roblox.com/users/4548670369/profile" target="_blank" class="btn roblox"><i class="fa-solid fa-gamepad"></i> Roblox</a>
                <a href="https://github.com/BloxForLife" target="_blank" class="btn github"><i class="fa-brands fa-github"></i> GitHub</a>
            </div>
        </div>
    </div>

    <script>
        // --- LIVE CLOCK SCRIPT ---
        function updateTime() {
            const timeOptions = { 
                timeZone: 'Africa/Cairo', 
                hour: '2-digit', 
                minute: '2-digit', 
                second: '2-digit',
                hour12: true 
            };
            const timeString = new Date().toLocaleTimeString('en-US', timeOptions);
            document.getElementById('local-time').textContent = timeString;
        }
        updateTime();
        setInterval(updateTime, 1000);

        // --- MUSIC PLAYER SCRIPT ---
        const music = document.getElementById('bg-music');
        const playBtn = document.getElementById('play-btn');
        const volumeSlider = document.getElementById('volume-slider');

        music.volume = 0.3;

        // Attempt to auto-play on page load and update the button if successful
        music.play().then(() => {
            playBtn.innerHTML = '<i class="fa-solid fa-pause"></i> Pause';
        }).catch((error) => {
            // Browser blocked autoplay; user must click play manually
            console.log("Autoplay blocked by browser. User must interact first.");
        });

        // Play/Pause toggle with icon updates
        playBtn.addEventListener('click', () => {
            if (music.paused) {
                music.play();
                playBtn.innerHTML = '<i class="fa-solid fa-pause"></i> Pause';
            } else {
                music.pause();
                playBtn.innerHTML = '<i class="fa-solid fa-play"></i> Play';
            }
        });

        // Volume slider
        volumeSlider.addEventListener('input', (e) => {
            music.volume = e.target.value;
        });
    </script>
</body>
</html>
